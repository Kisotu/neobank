openapi: 3.0.3
info:
  title: Banking API
  version: 0.1.0
  description: Initial API scaffold for the banking application.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /api/v1/auth/refresh:
    post:
      summary: Refresh token pair
      operationId: refreshAuthToken
      description: Rotates access and refresh tokens when a valid refresh token is provided.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token pair refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/auth/logout:
    post:
      summary: Stateless logout
      operationId: logout
      description: |
        Stateless logout endpoint. Clients should discard tokens locally.
        Tokens previously issued remain valid until expiration because there is no revocation store.
      security: []
      responses:
        "204":
          description: Logout acknowledged
  /api/v1/accounts/{id}/transfers:
    get:
      summary: List transfers by account
      operationId: listTransfersByAccount
      parameters:
        - in: path
          name: id
          required: true
          description: Account ID
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          description: Number of transfers to return.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          required: false
          description: Number of transfers to skip.
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Transfer history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransferResponse"
        "400":
          description: Invalid account ID or pagination query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidPagination:
                  value:
                    error:
                      code: INVALID_PAGINATION
                      message: limit must be greater than 0
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
    TransferResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        from_account_id:
          type: string
          format: uuid
        to_account_id:
          type: string
          format: uuid
        amount:
          type: string
        currency:
          type: string
        status:
          type: string
        reference_number:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    AuthResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - expires_in
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          format: int64